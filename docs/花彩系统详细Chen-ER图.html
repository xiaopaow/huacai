<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>花彩系统详细 Chen ER 图</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #eef0f5; color: #20232b; font-family: "Microsoft YaHei", sans-serif; }
    header { position: sticky; z-index: 5; top: 0; display: flex; align-items: center; gap: 12px; padding: 12px 18px; background: rgba(32,35,43,.96); color: white; box-shadow: 0 5px 24px rgba(0,0,0,.18); }
    header b { margin-right: auto; }
    header button { border: 1px solid #555b69; border-radius: 8px; background: #343844; color: white; padding: 8px 12px; cursor: pointer; }
    header button:hover { border-color: #cfff32; color: #cfff32; }
    header span { min-width: 58px; color: #cfff32; text-align: center; font-size: 12px; font-weight: 800; }
    main { overflow: auto; width: 100vw; height: calc(100vh - 58px); padding: 24px; }
    .canvas { width: max-content; transform-origin: top left; transition: transform .15s ease; box-shadow: 0 18px 70px rgba(30,35,55,.16); }
    img { display: block; width: 3600px; height: 2200px; background: white; }
    @media print {
      header { display: none; }
      main { overflow: visible; height: auto; padding: 0; }
      .canvas { transform: none !important; box-shadow: none; }
      img { width: 100%; height: auto; }
    }
  </style>
</head>
<body>
  <header>
    <b>花彩 Amazon Studio · 详细 Chen ER 图</b>
    <button type="button" id="minus">缩小</button>
    <span id="zoom">35%</span>
    <button type="button" id="plus">放大</button>
    <button type="button" id="fit">适合窗口</button>
    <button type="button" onclick="window.print()">打印 / 导出 PDF</button>
  </header>
  <main id="viewport">
    <div class="canvas" id="canvas">
      <img src="./花彩系统详细Chen-ER图.svg" alt="花彩系统详细 Chen 实体关系图" />
    </div>
  </main>
  <script>
    const canvas = document.querySelector("#canvas");
    const viewport = document.querySelector("#viewport");
    const label = document.querySelector("#zoom");
    let scale = 0.35;
    const render = () => {
      canvas.style.transform = `scale(${scale})`;
      canvas.style.marginRight = `${3600 * (scale - 1)}px`;
      canvas.style.marginBottom = `${2200 * (scale - 1)}px`;
      label.textContent = `${Math.round(scale * 100)}%`;
    };
    document.querySelector("#minus").onclick = () => { scale = Math.max(.2, scale - .1); render(); };
    document.querySelector("#plus").onclick = () => { scale = Math.min(1.5, scale + .1); render(); };
    document.querySelector("#fit").onclick = () => {
      scale = Math.max(.2, Math.min(1, (viewport.clientWidth - 48) / 3600));
      render();
      viewport.scrollTo(0, 0);
    };
    window.addEventListener("resize", () => document.querySelector("#fit").click());
    document.querySelector("#fit").click();
  </script>
</body>
</html>
