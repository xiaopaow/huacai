services:
  huacai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: huacai
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8787
    volumes:
      - ./data:/app/data
