services:
  huacai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: huacai
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    ports:
      - "${HUACAI_BIND_ADDRESS:-127.0.0.1}:${HUACAI_PORT:-8787}:8787"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8787
    volumes:
      - ./data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
